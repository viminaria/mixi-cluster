---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-6-35b-a3b-mtp
  namespace: llmkube-system
spec:
  modelRef: qwen3-6-35b-a3b-mtp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b9544
  runtimeClassName: nvidia
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  priorityClassName: llmkube-llmkube-normal
  extraArgs:
    - --n-gpu-layers
    - "60"
    - --tensor-split
    - "0.55,0.45"
    - --reasoning
    - on
    - --metrics
    - --cache-reuse
    - "1"
    - --tools
    - all
    - --temp
    - "1.0"
    - --top-p
    - "0.95"
    - --top-k
    - "20"
    - --min-p
    - "0.0"
    - --presence-penalty
    - "1.5"
    - --repeat-penalty
    - "1.0"
    - --fit
    - off
    - --spec-type
    - draft-mtp
    - --spec-draft-n-max
    - "2"
  replicas: 1
  cacheTypeK: q4_0
  cacheTypeV: q4_0
  contextSize: 262144
  flashAttention: true
  resources:
    gpu: 2
    cpu: "4"
    memory: "16Gi"
