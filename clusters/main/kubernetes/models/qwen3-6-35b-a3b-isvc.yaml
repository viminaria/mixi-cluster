---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-6-35b-a3b
  namespace: llmkube-system
spec:
  modelRef: qwen3-6-35b-a3b
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  runtimeClassName: nvidia
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  priorityClassName: llmkube-llmkube-normal
  extraArgs:
    - --n-gpu-layers
    - "60"
    - --mmproj
    - /models/mmproj.gguf
    - --mmproj-gpu-layers
    - "0"
  replicas: 1
  contextSize: 49152
  flashAttention: true
  resources:
    gpu: 2
    cpu: "4"
    memory: "16Gi"
