---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gemma4-31b
  namespace: llmkube-system
  annotations:
    cert-manager.io/cluster-issuer: domain-0-le-prod
    cert-manager.io/private-key-rotation-policy: Always
spec:
  ingressClassName: internal
  rules:
  - host: gemma.${DOMAIN_0}
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: gemma4-31b
            port:
              number: 8080
  tls:
    - hosts:
      - gemma.${DOMAIN_0}
      secretName: gemma-tls-0
