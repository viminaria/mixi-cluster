---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: gemma4-31b
  namespace: llmkube-system
spec:
  modelRef: gemma4-31b
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  runtimeClassName: nvidia
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  priorityClassName: llmkube-llmkube-normal
  extraArgs:
    - --n-gpu-layers
    - "999"
    - -t
    - "10"
    - --temp
    - "1.0"
    - --top-p
    - "0.95"
    - --top-k
    - "64"
    - --batch-size
    - "4096"
    - -ub
    - "1120"
    - -ctk
    - q8_0
    - -ctv
    - q8_0
    - -np
    - "1"
    - --no-mmap
  replicas: 1
  contextSize: 32768
  flashAttention: true
  resources:
    gpu: 2
    cpu: "10"
    memory: "24Gi"
  endpoint:
    type: ClusterIP
    port: 8080
