---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  interval: 15m
  chart:
    spec:
      chart: blocky
      version: 22.8.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    service:
      dns:
        externalTrafficPolicy: Local
        loadBalancerIP: ${BLOCKY_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
    k8sgateway:
      domains:
      - domain: "${DOMAIN_0}"
        dnsChallenge:
          enabled: false
          domain: dns01.clouddns.com
      forward:
        enabled: false
        primary: tls://1.1.1.1
        secondary: tls://1.0.0.1
        options:
          - name: tls_servername
            value: cloudflare-dns.com
    defaultUpstreams:
      - tls://1.1.1.1:853
      - tls://dns.google:853
      - https://dns.google/dns-query
      - https://cloudflare-dns.com/dns-query
      - https://dns.cloudflare.com/dns-query
      - tls://dns.mullvad.net
      - https://dns.mullvad.net/dns-query
    caching:
      minTime: 5m
      maxTime: 30m
      prefetchExpires: 2m
      prefetchThreshold: 3
      prefetchMaxItemsCount: 1000
    upstreamTimeout: 2s
    logLevel: warn
    configmap:
      dashboard:
        enabled: false
      datasource:
        enabled: false
    cnpg:
      main:
        enabled: false

    prometheus:
      enable: true
      path: /metrics

    metrics:
      main:
        enabled: true
        type: servicemonitor
        endpoints:
          - port: main
            path: /metrics
