---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-mmproj-downloader
spec:
  background: false
  rules:
  - name: inject-mmproj-init-container
    match:
      any:
      - resources:
          kinds:
          - Pod
          selector:
            matchLabels:
              inference.llmkube.dev/model: qwen3-6-35b-a3b-mtp
    mutate:
      patchStrategicMerge:
        spec:
          initContainers:
          - name: mmproj-downloader
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              curl -f --retry 3 --retry-delay 5 -L -o /models/mmproj.gguf "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/mmproj-F16.gguf"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsUser: 1000
              runAsGroup: 1000
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: model-cache
              mountPath: /models
