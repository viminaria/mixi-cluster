---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-mtp-heads-downloader
spec:
  background: false
  rules:
  - name: inject-mtp-heads-init-container
    match:
      any:
      - resources:
          kinds:
          - Pod
          selector:
            matchLabels:
              inference.llmkube.dev/model: gemma-4-31b
    mutate:
      patchStrategicMerge:
        spec:
          initContainers:
          - name: mtp-heads-downloader
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              curl -f --retry 3 --retry-delay 5 -L -o /models/mtp-heads.gguf "https://huggingface.co/unsloth/gemma-4-31B-it-GGUF/resolve/main/MTP/gemma-4-31B-it-MTP-Q8_0.gguf"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              runAsUser: 1000
              runAsGroup: 1000
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: model-cache
              mountPath: /models
