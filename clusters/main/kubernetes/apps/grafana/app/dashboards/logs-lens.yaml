apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "panels": [
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "id": 1,
          "title": "Log Volume by Pod",
          "type": "bargauge",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "options": {
            "displayMode": "gradient",
            "showUnfilled": true,
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "editorMode": "code",
              "expr": "sum by(pod) (count_over_time({job=\"fluent-bit\"} [$__range]))",
              "legendFormat": "{{pod}}",
              "queryType": "range"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "id": 2,
          "title": "Log Volume by Container",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "options": {
            "legend": {"displayMode": "table", "placement": "right"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "editorMode": "code",
              "expr": "sum by(container) (count_over_time({job=\"fluent-bit\"} [$__range]))",
              "legendFormat": "{{container}}",
              "queryType": "range"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "id": 3,
          "title": "All Logs",
          "type": "table",
          "gridPos": {"h": 16, "w": 24, "x": 0, "y": 8},
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Time"}]
          },
          "fieldConfig": {
            "defaults": {"custom": {"align": "auto"}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "Log"}, "properties": [
                {"id": "custom.width", "value": 600},
                {"id": "custom.displayMode", "value": "auto"}
              ]}
            ]
          },
          "transformations": [
            {
              "id": "extractFields",
              "options": {"source": "Line", "format": "logfmt"}
            }
          ],
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "editorMode": "code",
              "expr": "{job=\"fluent-bit\"} | logfmt",
              "queryType": "range"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "datasource": {"type": "loki", "uid": "loki"},
            "name": "pod_filter",
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "label": "Pod",
            "query": "label_values(pod)",
            "refresh": 2,
            "sort": 3,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "title": "Log Lens"
    }
