apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 1,
          "title": "Log Volume by Service",
          "type": "table",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "left",
                "cellOptions": { "type": "auto" }
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short",
              "reduceOptions": {
                "calcs": ["lastNotNull"]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "service_name" },
                "properties": [
                  { "id": "custom.displayName", "value": "Service" },
                  { "id": "custom.width", "value": 300 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "custom.displayName", "value": "Log Lines" },
                  { "id": "custom.displayMode", "value": "color-background-solid" },
                  { "id": "custom.width", "value": 400 },
                  { "id": "color", "value": { "mode": "continuous-GrYlRd" } }
                ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "options": {
            "cellHeight": "md",
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Log Lines" }]
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "sum by(service_name) (count_over_time({service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"} [$__range]))",
              "legendFormat": "{{service_name}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 2,
          "title": "Log Volume by Level",
          "type": "timeseries",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": {
            "legend": {
              "calcs": ["lastNotNull"],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "sum by(detected_level) (count_over_time({service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"} [$__range]))",
              "legendFormat": "{{detected_level}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 3,
          "title": "All Logs",
          "type": "table",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              },
              "displayName": "",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Line" },
                "properties": [
                  { "id": "custom.width", "value": 500 },
                  { "id": "custom.displayMode", "value": "auto" }
                ]
              }
            ]
          },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 8 },
          "options": {
            "cellHeight": "sm",
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Time" }]
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "{service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubernetes", "logs"],
      "templating": {
        "list": [
          {
            "datasource": { "type": "loki", "uid": "loki" },
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "multi": true,
            "name": "service",
            "query": "label_values(service_name)",
            "refresh": 2,
            "regex": "^(?!fluent-bit$|fluentbit$|loki$|unknown_service$).+",
            "skipUrlSync": false,
            "sort": 3,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Log Lens"
    }
