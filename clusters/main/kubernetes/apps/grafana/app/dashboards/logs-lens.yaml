apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "panels": [
        {
          "id": 1,
          "title": "Log Volume by Pod",
          "type": "bargauge",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by(pod) (count_over_time({job=\"fluent-bit\"$ns} [$__range]))",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 2,
          "title": "Log Volume by Container",
          "type": "timeseries",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by(container) (count_over_time({job=\"fluent-bit\"$ns} [$__range]))",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 3,
          "title": "All Logs",
          "type": "table",
          "transformations": [
            {
              "id": "extractFields",
              "options": {
                "source": "Line",
                "format": "logfmt"
              }
            }
          ],
          "targets": [
            {
              "editorMode": "code",
              "expr": "{job=\"fluent-bit\"$ns} | logfmt",
              "queryType": "range"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "ns",
            "type": "custom",
            "hide": 0,
            "current": {
              "text": "",
              "value": ""
            },
            "options": [
              {
                "text": "All namespaces",
                "value": ""
              }
            ],
            "query": "",
            "multi": false
          },
          {
            "name": "namespace_filter",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "hide": 0,
            "includeAll": true,
            "allValue": "",
            "multi": true,
            "label": "Namespace",
            "refresh": 2,
            "query": "(~\"blocky\",~\"cert-manager\",~\"cloudflareddns\",~\"cloudnative-pg\",~\"flux-system\",~\"frigate\",~\"grafana\",~\"home-assistant\",~\"kube-prometheus-stack\",~\"kubernetes-dashboard\",~\"kubernetes-reflector\",~\"kube-system\",~\"kyverno\",~\"llmkube-system\",~\"logging\",~\"loki\",~\"longhorn-system\",~\"metallb\",~\"minecraft\",~\"n8n\",~\"nginx-external\",~\"nginx-internal\",~\"nvidia-device-plugin\",~\"ollama\",~\"openebs\",~\"ozrates-static\",~\"searxng\",~\"snapshot-controller\",~\"spegel\",~\"spoolman\",~\"system-upgrade\",~\"uptime-kuma\",~\"valkey\",~\"viminariacom-static\",~\"volsync\",~\"wg-easy\")",
            "sort": 1,
            "tagValuesExpr": ""
          }
        ]
      },
      "title": "Log Lens"
    }
