apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 1,
          "title": "Log Volume by Pod",
          "type": "bargauge",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "options": {
            "displayMode": "gradient",
            "showUnfilled": true,
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "sum by(pod) (count_over_time({job=\"fluent-bit\"} [$__range]))",
              "legendFormat": "{{pod}}",
              "queryType": "range"
            }
          ]
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 2,
          "title": "Log Volume by Container",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "sum by(container) (count_over_time({job=\"fluent-bit\"} [$__range]))",
              "legendFormat": "{{container}}",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 3,
          "title": "All Logs",
          "type": "table",
          "transformations": [
            {
              "id": "extractFields",
              "options": {
                "source": "labels",
                "format": "json"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "labels": true,
                  "tsNs": true,
                  "labelTypes": true,
                  "id": true,
                  "job": true,
                  "Line": true,
                  "pod_lifecycle": true,
                  "pod_template_hash": true,
                  "app_kubernetes_io_name": true,
                  "release": true,
                  "app_kubernetes_io_instance": false
                },
                "indexByName": {
                  "Time": 0,
                  "namespace": 1,
                  "Line": 2
                }
              }
            }
          ],
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "{job=\"fluent-bit\"}",
              "queryType": "range"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "name": "pod_filter",
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "label": "Pod",
            "query": "label_values(pod)",
            "refresh": 2,
            "sort": 3,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "title": "Log Lens"
    }
