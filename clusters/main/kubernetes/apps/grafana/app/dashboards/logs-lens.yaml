apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "__inputs": [],
      "__requires": [],
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Log Volume by Service",
          "type": "bargauge",
          "pluginVersion": "11.0.0",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["sum"],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "Loki" },
              "editorMode": "code",
              "expr": "sum by(service_name) (count_over_time({} [$__range]))",
              "legendFormat": "{{service_name}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (last 30m)",
          "type": "timeseries",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": {
            "legend": {
              "calcs": ["sum", "max"],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "Loki" },
              "editorMode": "code",
              "expr": "sum by(service_name) (rate({detected_level=~\"error|critical|emerg\"} [$__interval]))",
              "legendFormat": "{{service_name}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Recent Errors & Warnings",
          "type": "logs",
          "pluginVersion": "11.0.0",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 8 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessages": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "Loki" },
              "editorMode": "code",
              "expr": "{detected_level=~\"error|critical|emerg|warning\"} |= ``",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "All Logs",
          "type": "logs",
          "pluginVersion": "11.0.0",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 8 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessages": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "Loki" },
              "editorMode": "code",
              "expr": "{}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubernetes", "logs"],
      "templating": {
        "list": [
          {
            "current": {},
            "definition": "label_values(service_name)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "service",
            "options": [],
            "query": {
              "query": "label_values(service_name)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Log Lens"
    }
