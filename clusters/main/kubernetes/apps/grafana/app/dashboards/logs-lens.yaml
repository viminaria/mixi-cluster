apiVersion: v1
kind: ConfigMap
metadata:
  name: log-lens
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  log-lens.json: |
    {
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 1,
          "title": "Log Volume by Service",
          "type": "bargauge",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "continuous-GrYlRd" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "sum by(service_name) (count_over_time({service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"} [$__range]))",
              "legendFormat": "{{service_name}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 2,
          "title": "Log Volume by Level",
          "type": "timeseries",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "options": {
            "legend": {
              "calcs": ["lastNotNull"],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "sum by(detected_level) (count_over_time({service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"} [$__range]))",
              "legendFormat": "{{detected_level}}",
              "queryType": "range",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "id": 3,
          "title": "All Logs",
          "type": "table",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              },
              "displayName": "",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Line" },
                "properties": [
                  { "id": "custom.width", "value": 500 },
                  { "id": "custom.displayMode", "value": "auto" },
                  { "id": "custom.displayName", "value": "Log line" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "app" },
                "properties": [
                  { "id": "custom.width", "value": 220 },
                  { "id": "custom.displayName", "value": "App" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "detected_level" },
                "properties": [
                  { "id": "custom.displayName", "value": "Level" },
                  { "id": "custom.width", "value": 80 }
                ]
              }
            ]
          },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 8 },
          "options": {
            "cellHeight": "sm",
            "footer": { "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Time" }]
          },
          "transformations": [
            {
              "id": "extractFields",
              "options": {
                "source": "labels",
                "format": "json"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "labels": true,
                  "tsNs": true,
                  "labelTypes": true,
                  "id": true,
                  "app_kubernetes_io_instance": true,
                  "app_kubernetes_io_managed_by": true,
                  "app_kubernetes_io_name": true,
                  "app_kubernetes_io_version": true,
                  "helm_revision": true,
                  "helm_sh_chart": true,
                  "pod_lifecycle": true,
                  "pod_name": true,
                  "pod_template_hash": true,
                  "kubernetes_annotations_checksum_cnpg": true,
                  "kubernetes_annotations_checksum_configmaps": true,
                  "kubernetes_annotations_checksum_mariadb": true,
                  "kubernetes_annotations_checksum_mongodb": true,
                  "kubernetes_annotations_checksum_persistence": true,
                  "kubernetes_annotations_checksum_redis": true,
                  "kubernetes_annotations_checksum_secrets": true,
                  "kubernetes_annotations_checksum_services": true,
                  "kubernetes_annotations_checksum_solr": true,
                  "kubernetes_host": true,
                  "kubernetes_container_name": true,
                  "kubernetes_docker_id": true,
                  "kubernetes_container_hash": true,
                  "kubernetes_container_image": true,
                  "kubernetes_labels_release": true,
                  "kubernetes_pod_name": true,
                  "kubernetes_namespace_name": true,
                  "kubernetes_pod_id": true,
                  "release": true
                },
                "indexByName": {
                  "Time": 0,
                  "app": 1,
                  "detected_level": 2,
                  "Line": 3
                }
              }
            }
          ],
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "editorMode": "code",
              "expr": "{service_name=~\"$service\", service_name!~\"fluent-bit|fluentbit|loki|unknown_service\"} | json | line_format \"{{.log}}\"",
              "queryType": "range",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["kubernetes", "logs"],
      "templating": {
        "list": [
          {
            "datasource": { "type": "loki", "uid": "loki" },
            "hide": 0,
            "includeAll": true,
            "allValue": ".+",
            "multi": true,
            "name": "service",
            "query": "label_values(service_name)",
            "refresh": 2,
            "regex": "^(?!fluent-bit$|fluentbit$|loki$|unknown_service$).+",
            "skipUrlSync": false,
            "sort": 3,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Log Lens"
    }
