apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama_cpp
  namespace: llama_cpp
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 18.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  timeout: 20m
  values:
    global:
      stopAll: false
    image:
      repository: ggml-org/llama.cpp
      pullPolicy: IfNotPresent
      tag: full-cuda13
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
    service:
      main:
        ports:
          main:
            port: 8000
    workload:
      main:
        podSpec:
          runtimeClassName: nvidia
          containers:
            main:
              env:
                HF_TOKEN: ${HF_TOKEN}
              resources:
                limits:
                  nvidia.com/gpu: 2
    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: llama.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
    persistence:
      models:
        enabled: true
        type: nfs
        path: ${LLAMA_NFS_PATH}
        server: ${PROXMOX_IP}
