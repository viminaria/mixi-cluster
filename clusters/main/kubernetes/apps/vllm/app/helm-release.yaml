apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
  namespace: vllm
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 18.4.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 30m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  timeout: 20m
  values:
    global:
      stopAll: false
    image:
      repository: tytn/vllm-openai
      pullPolicy: IfNotPresent
      tag: cu12.2
    securityContext:
      container:
        runAsNonRoot: false
        readOnlyRootFilesystem: false
        runAsUser: 0
        runAsGroup: 0
    service:
      main:
        ports:
          main:
            port: 11434
    workload:
      main:
        podSpec:
          runtimeClassName: nvidia
          containers:
            main:
              env:
                HF_TOKEN: ${HF_TOKEN}
                VLLM_MAIN_CUDA_VERSION: 12.2
              resources:
                limits:
                  nvidia.com/gpu: 2
    ingress:
      main:
        enabled: true
        ingressClassName: "internal"
        hosts:
          - host: vllm.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix
        integrations:
          nginx:
            enabled: true
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
    persistence:
      models:
        enabled: true
        mountPath: /root/.cache/huggingface
