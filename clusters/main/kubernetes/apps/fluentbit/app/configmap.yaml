apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/logging/fluent-bit-*_*/fluent-bit/*/*.0.log

    [OUTPUT]
        Name                loki
        Match               var.log.pods.*
        Host                172.16.0.27
        Port                3100
        URI                 /loki/api/v1/push
        tls                 false
        auto_kubernetes_labels true
        retry_limit         5
