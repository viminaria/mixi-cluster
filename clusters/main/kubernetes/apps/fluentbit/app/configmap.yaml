apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Db                /run/fluentbit/flb.db
        Db.Sync           full

    [FILTER]
        Name                parser
        Match               *
        Key_Name            log
        Parser            containerd
        Reserve_Data       true

    [OUTPUT]
        Name                loki
        Match               *
        Host                172.17.16.29
        Port                3100
        URI                 /loki/api/v1/push
        tls                 off
        auto_kubernetes_labels on
