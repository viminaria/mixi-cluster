apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/logging/fluent-bit-*_*/fluent-bit/*/*.0.log
        DB                /run/fluentbit/fluent-bit.db
        DB.Sync           Normal
        DB.Locking        On
        Refresh_Interval  30s
        Ignore_Older      24h

    [FILTER]
        Name                kubernetes
        Match               var.log.pods.*
        kube_url            https://10.128.1.15:6443
        kube_ca_file        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kube_token_file     /var/run/secrets/kubernetes.io/serviceaccount/token
        merge_log           On
        keep_log            On
        buffer_size         50K
        k8s-logging.parser  On

    [OUTPUT]
        Name                 loki
        Match                var.log.pods.*
        Host                 loki.loki.svc.cluster.local
        Port                 3100
        URI                  /loki/api/v1/push
        tls                  false
        auto_kubernetes_labels "true"
        Retry_Limit          "5"
