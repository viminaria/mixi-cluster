apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              dummy
        tag                 kube.dummy
        interval_sec        1

    [OUTPUT]
        Name                stdout
        Match               *
        Format              json
