apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/logging/fluent-bit-*_*/fluent-bit/*/*.0.log
        Tag               kube.*
        DB                /run/fluentbit/fluent-bit.db
        DB.Sync           Normal
        DB.Locking        On
        Refresh_Interval  30s
        Ignore_Older      24h

    [OUTPUT]
        Name             loki
        Match            kube.*
        Host             loki.loki.svc.cluster.local
        Port             3100
        uri              /loki/api/v1/push
        Retry_Limit      False
