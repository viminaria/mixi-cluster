apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Db                /run/fluentbit/flb.db
        Db.Sync           full

    [OUTPUT]
        Name                stdout
        Match               *
        Format              json
