apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Db                /run/fluentbit/flb.db
        Db.Sync           full

    [FILTER]
        Name                kubernetes
        Match               *
        Kube_URL            https://kubernetes.default.svc:443
        Kube_Tag_Prepend    application/
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Exclude On

    [OUTPUT]
        Name                loki
        Match               *
        Host                loki-gateway.loki.svc.cluster.local
        Port                80
        URI                 /loki/api/v1/push
        tls                 off
        auto_kubernetes_labels on
        label_keys          namespace_name
