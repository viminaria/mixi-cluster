apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     debug2
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        DB                /run/fluentbit/fluent-bit.db
        Tag               pod.*
        DB.Sync           Normal
        DB.Locking        On

    [OUTPUT]
        Name                stdout
        Match               *
        Format              json
