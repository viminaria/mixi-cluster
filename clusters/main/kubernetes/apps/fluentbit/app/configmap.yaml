apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              dummy
        Tag               var.log.pods.test.dummy.0.log

    [OUTPUT]
        Name                stdout
        Match               var.log.pods.*
        Format              json
