apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/logging/fluent-bit-*_*/fluent-bit/*/*.0.log,*/etc/containers/*/storage
        Tag               kube.${kubernetes["namespace_name"]}.${kubernetes["pod_name"]}-${kubernetes["container_name"]}

    [OUTPUT]
        Name                loki
        Match               kube.*
        Host                loki-gateway
        Port                80
        URI                 /loki/api/v1/push
        tls                  false
        auto_kubernetes_labels true
        Label_Keys            pod_name,container_name
