apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              dummy
        Tag               var.log.pods.test.dummy.0.log

    [OUTPUT]
        Name                stdout
        Match               var.log.pods.*
        Format              json

    [OUTPUT]
        Name                 loki
        Match                var.log.pods.*
        Host                 loki.loki.svc.cluster.local
        Port                 3100
        URI                  /loki/api/v1/push
        tls                  false
        auto_kubernetes_labels true
        retry_limit          5
