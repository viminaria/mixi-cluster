apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/pods/*/*/*.log
        Exclude_Path      /var/log/pods/logging/fluent-bit-*_*/fluent-bit/*/*.0.log
        Tag               kube.*
        DB                /run/fluentbit/fluent-bit.db
        Read_From_Head    On
        Refresh_Interval  30
        Rotate_Wait       120
        Mem_Buf_Limit     5MB

    [OUTPUT]
        Name             loki
        Match            kube.*
        Host             loki.loki.svc.cluster.local
        Port             3100
        uri              /loki/api/v1/push

