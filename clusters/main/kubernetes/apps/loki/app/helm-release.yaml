---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: loki
  annotations:
    meta.helm.sh/release-name: loki
    meta.helm.sh/release-namespace: loki
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: "17.1.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 20Gi
        accessModes:
          - ReadWriteOnce
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 3Gi
      sidecar: true
    gateway:
      enabled: false
    monitoring: {}
    backend:
      replicas: 0
    write:
      enabled: false
    read:
      enabled: false
    queryFrontend:
      enabled: false
    queryScheduler:
      enabled: false
    distributor:
      enabled: false
    ingester:
      enabled: false
    compactor:
      enabled: false
    indexGateway:
      replicas: 0
    bloomCompactor:
      enabled: false
    bloomGovernor:
      enabled: false
    analytics:
      reporting_enabled: false

    loki:
      commonConfig:
        replication_factor: 1
      storage:
        type: fs
      storageConfiguration:
        fs:
          directory: /loki/chunks
      auth_enabled: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: ''
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
