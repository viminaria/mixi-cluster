---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 15m
  chart:
    spec:
      chart: n8n
      version: 21.12.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Helsinki
    global:
      stopAll: false
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: "n8n.${DOMAIN_0}"
            paths:
            - path: "/"
              pathType: "Prefix" 
        integrations:
          traefik:
            enabled: false
            #auth
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                - name: N8N_EDITOR_BASE_URL
                  value: "https://n8n.${DOMAIN_0}"
                - name: N8N_AI_ASSISTANT_BASE_URL
                  value: "https://n8n.${DOMAIN_0}"
                - name: N8N_HOST
                  value: "n8n.${DOMAIN_0}"
                - name: N8N_PROTOCOL
                  value: https
                - name: WEBHOOK_URL
                  value: "https://n8n.${DOMAIN_0}/"
